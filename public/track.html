<!doctype html><html><head><title>Track Order • The PR Network</title>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<style>
:root{--bg:#070707;--text:#fff8eb;--muted:#b9b0a1;--gold:#f4c560;--gold2:#ffe0a0;--line:rgba(255,255,255,.12);--ok:#73e6a6;--bad:#ff756f;--blue:#7db4ff}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top right,rgba(244,197,96,.16),transparent 35%),var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Arial,sans-serif;font-weight:650}
.wrap{max-width:980px;margin:0 auto;padding:0 14px 95px}header{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:12px 0;background:rgba(7,7,7,.94);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.07)}
.brand{font-weight:950;letter-spacing:-.04em;font-size:17px;white-space:nowrap}.brand b{color:var(--gold)}
.menuBtn{width:46px;height:46px;border-radius:16px;border:1px solid var(--line);background:#151515;color:var(--text);display:grid;place-items:center}.menuBtn svg{width:23px}
.nav{display:none;position:absolute;right:14px;top:62px;background:#111;border:1px solid var(--line);border-radius:18px;padding:8px;box-shadow:0 30px 80px rgba(0,0,0,.45)}.nav.open{display:grid;gap:8px}.nav a{width:180px;text-align:center;text-decoration:none}
button,.btn{border:1px solid var(--line);background:#171717;color:var(--text);border-radius:999px;padding:13px 18px;font:inherit;font-weight:900;cursor:pointer;text-decoration:none;display:inline-block}.primary{background:linear-gradient(135deg,var(--gold),#ffe4a8);color:#111;border:0}
.hero{padding:18px 0 10px}.eyebrow{display:inline-flex;border:1px solid rgba(244,197,96,.28);background:rgba(244,197,96,.08);color:var(--gold2);border-radius:999px;padding:8px 12px;font-size:12px;font-weight:950}
h1{margin:12px 0 8px;font-size:clamp(30px,9vw,58px);line-height:.94;letter-spacing:-.07em;max-width:720px}.gold{color:var(--gold)}.sub{font-size:15px;line-height:1.45;color:#e4dbc9;margin:0 0 14px;max-width:680px}
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}.step{background:rgba(255,255,255,.055);border:1px solid var(--line);border-radius:16px;padding:11px}.step b{display:block;font-size:18px}.step span{font-size:11px;color:#e6dcc9}
.platformTop{position:sticky;top:70px;z-index:15;background:rgba(7,7,7,.94);backdrop-filter:blur(14px);padding:10px 0;border-bottom:1px solid rgba(255,255,255,.07)}.platformTitle{font-size:13px;color:var(--muted);margin:0 0 8px}
.tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:3px}.tabs::-webkit-scrollbar{display:none}.tab{flex:0 0 auto;padding:13px 18px}.tab.active{background:linear-gradient(135deg,var(--gold),#ffe2a0);color:#111;border:0}
.grid{display:grid;gap:14px}.card,.panel{background:linear-gradient(145deg,rgba(255,255,255,.07),rgba(255,255,255,.025));border:1px solid var(--line);border-radius:24px;padding:17px;margin:12px 0}.card h3{margin:0 0 8px;font-size:22px;letter-spacing:-.04em}.desc{color:var(--muted);font-size:14px;line-height:1.45;margin:0 0 12px}
.icon{width:48px;height:48px;border:1px solid rgba(244,197,96,.25);border-radius:16px;display:grid;place-items:center;background:rgba(244,197,96,.08);color:var(--gold2);margin-bottom:12px}.icon svg{width:25px;height:25px}
.packages{display:grid;gap:8px;margin:12px 0}.pkg{display:flex;justify-content:space-between;gap:8px;padding:11px 12px;border:1px solid rgba(244,197,96,.22);background:rgba(244,197,96,.07);border-radius:14px;font-size:13px;color:#ffe5a9}.pkg b{color:white}
.full{width:100%;margin-top:12px}label{display:block;font-size:13px;color:#f4e7ca;margin:12px 0 6px}input,select,textarea{width:100%;border:1px solid var(--line);background:#0b0b0b;color:var(--text);border-radius:17px;padding:15px;font:inherit;font-weight:750;outline:none}
.formGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.notice{border:1px solid rgba(244,197,96,.3);background:rgba(244,197,96,.08);color:#ffe6ad;border-radius:18px;padding:12px;font-size:12px;line-height:1.45}.result{margin-top:14px}.status{font-weight:950}.Pending{color:var(--blue)}.Processing{color:var(--gold)}.Completed{color:var(--ok)}.Cancelled{color:var(--bad)}
.bottomBar{position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgba(7,7,7,.95);border-top:1px solid var(--line);padding:10px 14px env(safe-area-inset-bottom);display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(min-width:760px){.menuBtn{display:none}.nav{display:flex;position:static;background:transparent;border:0;padding:0;box-shadow:none}.nav a{width:auto}.grid{grid-template-columns:repeat(2,1fr)}.card{margin:0}.bottomBar{display:none}.wrap{padding-bottom:40px}}
@media(max-width:430px){.wrap{padding-left:12px;padding-right:12px}.hero{padding-top:8px}h1{font-size:31px}.sub{font-size:14px}.steps{gap:7px}.step{padding:9px}.formGrid{grid-template-columns:1fr}.brand{font-size:16px}}
</style>
<script>
const icons={users:'<svg viewBox="0 0 24 24" fill="none"><path d="M16 11a4 4 0 1 0-8 0M3.5 20c.8-3.4 3.7-5 8.5-5s7.7 1.6 8.5 5" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/></svg>',heart:'<svg viewBox="0 0 24 24" fill="none"><path d="M12 20s-7.5-4.6-9.2-9.1C1.5 7.3 3.7 4.5 7 4.5c2 0 3.5 1.1 5 3 1.5-1.9 3-3 5-3 3.3 0 5.5 2.8 4.2 6.4C19.5 15.4 12 20 12 20Z" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"/></svg>',chat:'<svg viewBox="0 0 24 24" fill="none"><path d="M5 18.5 3.8 22l4-1.3c1.2.5 2.6.8 4.2.8 5 0 9-3.4 9-7.7S17 6 12 6s-9 3.4-9 7.8c0 1.8.7 3.5 2 4.7Z" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"/></svg>',play:'<svg viewBox="0 0 24 24" fill="none"><path d="M4 8.7A3.7 3.7 0 0 1 7.7 5h8.6A3.7 3.7 0 0 1 20 8.7v6.6a3.7 3.7 0 0 1-3.7 3.7H7.7A3.7 3.7 0 0 1 4 15.3V8.7Z" stroke="currentColor" stroke-width="1.9"/><path d="m10 9 5 3-5 3V9Z" fill="currentColor"/></svg>',eye:'<svg viewBox="0 0 24 24" fill="none"><path d="M2.5 12s3.4-6 9.5-6 9.5 6 9.5 6-3.4 6-9.5 6-9.5-6-9.5-6Z" stroke="currentColor" stroke-width="1.9"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.9"/></svg>',spark:'<svg viewBox="0 0 24 24" fill="none"><path d="M12 2.8 14.5 9l6.7 3-6.7 3L12 21.2 9.5 15l-6.7-3 6.7-3L12 2.8Z" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"/></svg>'};
async function api(url,opt={}){const r=await fetch(url,{headers:{'Content-Type':'application/json',...(opt.headers||{})},credentials:'include',...opt});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||'Request failed');return d}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function menu(){document.getElementById('nav').classList.toggle('open')}
</script>
</head><body><div class="wrap">
<header>
  <div class="brand">THE <b>PR</b> NETWORK</div>
  <button class="menuBtn" onclick="menu()" aria-label="Open menu"><svg viewBox="0 0 24 24" fill="none"><path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
  <nav class="nav" id="nav">
    <a class="btn" href="/">Services</a>
    <a class="btn" href="/track.html">Track Order</a>
    <a class="btn" href="/my-orders.html">My Orders</a>
    <a class="btn primary" href="/login.html">Login</a>
  </nav>
</header>
<section class="panel"><h1>Track Order</h1><p class="sub">Enter your order ID to check status.</p><div class="formGrid"><input id="orderId" placeholder="PRN-XXXXXXXX"><button class="primary" onclick="track()">Track</button></div><div id="result"></div></section></div><script>const q=new URLSearchParams(location.search);if(q.get('id'))orderId.value=q.get('id');async function track(){try{const {order}=await api('/api/orders/'+encodeURIComponent(orderId.value.trim()));result.innerHTML=`<div class="card"><h3>${esc(order.id)}</h3><p>Status: <span class="status ${esc(order.status)}">${esc(order.status)}</span></p><p class="desc">${esc(order.platform)} • ${esc(order.service)} • ${esc(order.packageName)} • ${esc(order.price)}</p></div>`}catch(e){result.innerHTML='<div class="notice">'+esc(e.message)+'</div>'}}if(orderId.value)track();</script></body></html>
